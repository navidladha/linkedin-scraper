name: LinkedIn Nonprofit Scrape

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx==0.27.0 gspread==6.1.2 google-auth==2.29.0

      - name: Run scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          python3 << 'EOF'
          import json, os, time, httpx, gspread
          from datetime import datetime, timezone, timedelta
          from google.oauth2.service_account import Credentials

          RAPIDAPI_KEY = os.environ["RAPIDAPI_KEY"]
          GOOGLE_SHEET_ID = os.environ["GOOGLE_SHEET_ID"]
          GOOGLE_CREDS_JSON = os.environ["GOOGLE_CREDENTIALS_JSON"]

          RAPIDAPI_HOST = "linkedin-scraper-api-real-time-fast-affordable.p.rapidapi.com"
          RAPIDAPI_URL = f"https://{RAPIDAPI_HOST}/jobs/search"

          MIN_SALARY = 80000

          SHEET_COLUMNS = [
              "id", "title", "company", "company_url", "location", "work_type",
              "salary", "skills", "benefits", "applicant_count",
              "apply_url", "posted_at", "source_platform", "scraped_at",
          ]

          def now_iso():
              return datetime.now(timezone.utc).isoformat()

          def fetch_jobs():
              headers = {
                  "x-rapidapi-host": RAPIDAPI_HOST,
                  "x-rapidapi-key": RAPIDAPI_KEY,
                  "Content-Type": "application/json",
              }
              params = {
                  "keywords": "nonprofit",
                  "location": "United States",
                  "work_type": "Remote",
                  "page_number": "1",
              }
              resp = httpx.get(RAPIDAPI_URL, headers=headers, params=params, timeout=30)
              if resp.status_code == 429:
                  print("Rate limited — try again later.")
                  return []
              resp.raise_for_status()
              data = resp.json()
              jobs = data.get("data", {}).get("jobs", [])
              total = data.get("data", {}).get("metadata", {}).get("total_jobs", 0)
              print(f"Fetched {len(jobs)} jobs (of {total} total remote nonprofit jobs).")
              return jobs

          def is_fresh(job):
              posted = job.get("posted_at") or ""
              if not posted:
                  return False
              try:
                  dt = datetime.fromisoformat(posted.replace("Z", "+00:00"))
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt >= datetime.now(timezone.utc) - timedelta(hours=24)
              except Exception:
                  return False

          def meets_salary(job):
              salary = job.get("salary") or ""
              if not salary:
                  return True
              try:
                  import re
                  nums = re.findall(r'[\d,]+', salary.replace(",", ""))
                  if not nums:
                      return True
                  max_val = max(int(n.replace(",", "")) for n in nums)
                  if "k" in salary.lower():
                      max_val *= 1000
                  if "/hr" in salary.lower() or "hour" in salary.lower():
                      max_val *= 2080
                  return max_val >= MIN_SALARY
              except Exception:
                  return True

          def parse_job(job, scraped_at):
              return {
                  "id": str(job.get("job_id") or ""),
                  "title": job.get("job_title") or "",
                  "company": job.get("company") or "",
                  "company_url": job.get("company_url") or "",
                  "location": job.get("location") or "",
                  "work_type": job.get("work_type") or "",
                  "salary": job.get("salary") or "",
                  "skills": ", ".join(job.get("skills") or []),
                  "benefits": ", ".join(job.get("benefits") or []),
                  "applicant_count": job.get("applicant_count") or "",
                  "apply_url": job.get("job_url") or "",
                  "posted_at": job.get("posted_at") or "",
                  "source_platform": "linkedin.com",
                  "scraped_at": scraped_at,
              }

          print(f"[{now_iso()}] Starting LinkedIn scrape...")
          jobs = fetch_jobs()

          if not jobs:
              print("No jobs fetched — exiting.")
              exit(0)

          fresh = [j for j in jobs if is_fresh(j)]
          no_easy = [j for j in fresh if not j.get("is_easy_apply")]
          salaried = [j for j in no_easy if meets_salary(j)]
          print(f"After 24h filter: {len(fresh)} | After removing easy apply: {len(no_easy)} | After salary filter: {len(salaried)}")

          creds = Credentials.from_service_account_info(
              json.loads(GOOGLE_CREDS_JSON.strip()),
              scopes=["https://www.googleapis.com/auth/spreadsheets"],
          )
          gc = gspread.authorize(creds)
          sh = gc.open_by_key(GOOGLE_SHEET_ID)
          try:
              ws = sh.worksheet("LinkedIn Jobs")
          except gspread.WorksheetNotFound:
              ws = sh.add_worksheet("LinkedIn Jobs", rows=10000, cols=len(SHEET_COLUMNS))
              ws.append_row(SHEET_COLUMNS)

          existing_ids = set(ws.col_values(1)[1:])
          new_jobs = [j for j in salaried if str(j.get("job_id") or "") not in existing_ids]
          print(f"Existing in sheet: {len(existing_ids)} | New to add: {len(new_jobs)}")

          if not new_jobs:
              print("No new jobs. Done.")
          else:
              scraped_at = now_iso()
              rows = [parse_job(j, scraped_at) for j in new_jobs]
              ws.append_rows([[r.get(col, "") for col in SHEET_COLUMNS] for r in rows], value_input_option="RAW")
              print(f"Added {len(rows)} new jobs.")
          print("Done.")
          EOF
